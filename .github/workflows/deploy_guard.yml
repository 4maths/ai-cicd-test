name: AI Deploy Guard

on:
  workflow_run:
    workflows: ["Deploy"]
    types: [completed]

jobs:
  deploy-guard:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install package and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run Deploy Guard
        env:
          DEPLOY_GUARD_URL: ${{ secrets.DEPLOY_GUARD_URL }}
          DEPLOY_GUARD_TIMEOUT: "5"
          DEPLOY_GUARD_MAX_LATENCY_MS: "1000"
          DEPLOY_GUARD_EXPECT_TEXT: "ok"
        run: aicicd deploy-guard